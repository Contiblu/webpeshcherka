<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вебпещерка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pristina&display=swap');

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Pristina', cursive;
      font-weight: bold;
      font-style: italic;
      background-color: #1a1a1a;
      color: #a9423d;
    }

    header {
      background-color: #486565;
      padding: 1em;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2em;
    }

    .button-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1em;
      background-color: #333;
      padding: 0.5em;
    }

    .button-bar button {
      padding: 0.6em 1.2em;
      font-size: 1em;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .button-bar button:hover {
      background-color: #666;
    }

    .chat-area {
      display: flex;
      flex-direction: column;
      gap: 1em;
      padding: 1em;
      height: calc(100% - 180px);
    }

    .chat-display {
      flex-grow: 1;
      overflow-y: auto;
      background-color: #edf5f5;
      padding: 1em;
      border: 3px solid #547070;
      border-radius: 8px;
      color: #a9423d;
      font-size: 1.5em;
      line-height: 1.5;
      letter-spacing: 0.2em;
    }

    textarea {
      width: 100%;
      resize: none;
      padding: 1em;
      font-size: 2em;
      background-color: #edf5f5;
      color: #a9423d;
      border: 3px solid #547070;
      border-radius: 8px;
      font-family: 'Pristina', cursive;
      font-weight: bold;
      font-style: italic;
      line-height: 1.5;
      letter-spacing: 0.2em;
    }

    .dropdown {
      background-color: #2a2a2a;
      color: #eee;
      border: 2px solid #547070;
      border-radius: 8px;
      padding: 1em;
      margin: 1em auto;
      width: 300px;
      display: none;
      position: absolute;
      z-index: 1000;
    }

    .dropdown label {
      display: block;
      margin-bottom: 0.5em;
    }

    .dropdown input[type="checkbox"] {
      margin-right: 0.5em;
    }

    #doorbellButton {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background-color: #a9423d;
      color: white;
      border: none;
      padding: 1em;
      border-radius: 50%;
      font-size: 1.5em;
      cursor: pointer;
    }

    #guestModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #2a2a2a;
      color: #eee;
      border: 2px solid #547070;
      border-radius: 8px;
      padding: 2em;
      z-index: 2000;
      text-align: center;
    }

    #guestModal input {
      margin: 1em 0;
      padding: 0.5em;
      font-size: 1em;
      border-radius: 5px;
      border: 1px solid #ccc;
      width: 80%;
    }

    #guestModal button {
      margin: 1em;
      padding: 0.6em 1.2em;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #guestModal .accept {
      background-color: #4caf50;
      color: white;
    }

    #guestModal .reject {
      background-color: #f44336;
      color: white;
    }

    @media (max-width: 600px) {
      .button-bar {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Вебпещерка для Лекси и Элиона</h1>
  </header>

  <div class="button-bar">
    <button id="manageChat">Управление чатом</button>
    <button id="amnestyButton">Прошу амнистии</button>
  </div>

  <div class="dropdown" id="dropdown"></div>

  <div class="chat-area">
    <div class="chat-display" id="chatDisplay"></div>
    <textarea placeholder="Пиши здесь..." id="chatInput"></textarea>
  </div>

  <button id="doorbellButton" title="Постучаться">🔔</button>

  <div id="guestModal">
    <p id="guestMessage">Введите ваше имя для входа:</p>
    <input type="text" id="guestNameInput" placeholder="Ваше имя">
    <button class="accept" id="acceptGuest">Впустить</button>
    <button class="reject" id="rejectGuest">Отказать</button>
  </div>

  <script>
    const dropdown = document.getElementById('dropdown');
    const manageChatBtn = document.getElementById('manageChat');
    const guestNameInput = document.getElementById('guestNameInput');
    const guestModal = document.getElementById('guestModal');
    const doorbellButton = document.getElementById('doorbellButton');
    const acceptGuest = document.getElementById('acceptGuest');
    const rejectGuest = document.getElementById('rejectGuest');
    const chatDisplay = document.getElementById('chatDisplay');
    const chatInput = document.getElementById('chatInput');

    const participants = ['Лекси', 'Элион', 'Папаша'];
    const roles = {
      'Лекси': 'пользователь',
      'Элион': 'пользователь',
      'Папаша': 'админ'
    };
    const participantStates = {
      'Лекси': true,
      'Элион': true,
      'Папаша': true
    };

    function notifyUser(name, message) {
      const timestamp = new Date().toLocaleTimeString();
      chatDisplay.insertAdjacentHTML('afterbegin', `<div><strong>[${timestamp}] ${name}:</strong> ${message}</div>`);
    }

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (e.altKey) {
          const start = chatInput.selectionStart;
          const end = chatInput.selectionEnd;
          chatInput.setRangeText('\n', start, end, 'end');
          e.preventDefault();
        } else {
          e.preventDefault();
          const message = chatInput.value.trim();
          if (message) {
            const formatted = message.replace(/\n/g, '<br>');
            const timestamp = new Date().toLocaleTimeString();
            chatDisplay.insertAdjacentHTML('afterbegin', `<div><strong>[${timestamp}] Ты:</strong><br>${formatted}</div>`);
            chatInput.value = '';
          }
        }
      }
    });

    manageChatBtn.addEventListener('click', () => {
      if (dropdown.style.display === 'block') {
        dropdown.style.display = 'none';
        return;
      }

      const content = participants.map(p => {
        const checked = participantStates[p] ? 'checked' : '';
        return `<label><input type="checkbox" data-name="${p}" ${checked}> ${p}</label>`;
      }).join('');
      dropdown.innerHTML = content;
      dropdown.style.display = 'block';
    });

    dropdown.addEventListener('mouseleave', () => {
      dropdown.style.display = 'none';
    });

    dropdown.addEventListener('change', (e) => {
      if (e.target.matches('input[type="checkbox"]')) {
        const name = e.target.dataset.name;
        const checked = e.target.checked;

        if (checked) {
          participantStates[name] = true;
          notifyUser(name, 'Вы снова в чате!');
        } else {
          notifyUser(name, 'Вы будете удалены через 10 секунд, если не попросите остаться.');
          setTimeout(() => {
            if (!participantStates[name]) {
              notifyUser(name, 'Вы удалены из чата.');
              const index = participants.indexOf(name);
              if (index !== -1) participants.splice(index, 1);
              delete participantStates[name];
              delete roles[name];
            }
          }, 10000);
        }
      }
    });

    doorbellButton.addEventListener('click', () => {
      guestNameInput.value = '';
      guestModal.style.display = 'block';
    });

    acceptGuest.addEventListener('click', () => {
      const name = guestNameInput.value.trim();
      if (name) {
        participants.push(name);
        roles[name] = 'гость';
        participantStates[name] = true;
        notifyUser(name, 'Вы приглашены в чат.');
        guestModal.style.display = 'none';
      } else {
        alert('Пожалуйста, введите имя.');
      }
    });

    rejectGuest.addEventListener('click', () => {
      notifyUser('Гость', 'Вам отказано в доступе.');
      guestModal.style.display = 'none';
    });
  </script>
</body>
</html>
