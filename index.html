<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вебпещерка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Вебпещерка для Лекси и Элиона</h1>
  </header>

  <div class="button-bar">
    <button id="manageChat">Управление чатом</button>
    <button id="amnestyButton">Прошу амнистии</button>
  </div>

  <div class="dropdown" id="dropdown"></div>

  <div class="chat-area">
    <div class="chat-display" id="chatDisplay"></div>
    <textarea placeholder="Пиши здесь..." id="chatInput"></textarea>
  </div>

  <button id="doorbellButton" title="Постучаться">🔔</button>

  <div id="guestModal">
    <p id="guestMessage">Введите ваше имя для входа:</p>
    <input type="text" id="guestNameInput" placeholder="Ваше имя">
    <button class="accept" id="acceptGuest">Впустить</button>
    <button class="reject" id="rejectGuest">Отказать</button>
  </div>

  <script src="script.js"></script>
  <script>
  const socket = new WebSocket('ws://localhost:3000');

  socket.addEventListener('open', () => {
    console.log('✅ WebSocket-соединение установлено');
    socket.send('👋 Привет с клиента!');
  });

  socket.addEventListener('message', event => {
    console.log('📩 Получено сообщение от сервера:', event.data);
  });

  socket.addEventListener('close', () => {
    console.log('❌ Соединение с WebSocket сервером закрыто');
  });

  socket.addEventListener('error', error => {
    console.error('⚠️ Ошибка WebSocket:', error);
  });
</script>
</body>
</html>
