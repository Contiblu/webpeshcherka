name: Run Stitch Intelligence

on:
  schedule:
    # Запуск каждый понедельник в 12:00 UTC (18:00 Алматы)
    - cron: '0 12 * * 1'
  workflow_dispatch:
    # Позволяет запускать вручную из вкладки Actions

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r intelligence/requirements.txt

      - name: Execute Intelligence
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python intelligence/butcher.py
          python intelligence/sorter.py
